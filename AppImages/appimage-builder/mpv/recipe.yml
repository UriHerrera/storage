version: 1

script: []
  #- rm -r ./AppDir
  #- rm -r ./appimage-builder-cache
  #- rm ./*.AppImage

AppDir:
  path: ./AppDir

  app_info:
    id: mpv
    name: mpv
    icon: mpv
    version: 0.32.0
    exec: usr/bin/mpv

  apt:
    arch: amd64
    sources:
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu bionic main restricted universe multiverse'
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu bionic-security main restricted universe multiverse'
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu bionic-updates main restricted universe multiverse'
        key_url: 'http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x3b4fe6acc0b21f32'
      - sourceline: 'deb [arch=amd64] http://ppa.launchpad.net/mc3man/mpv-tests/ubuntu bionic main'
        key_url: 'https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x90bd7eaced8e640a'
    
    include:
      - mpv=2:0.32.0+git4~bionic1
    exclude: []

  runtime:
    env:
     PATH: '${APPDIR}/usr/bin:${PATH}'

  files:
    exclude:
      - usr/lib/x86_64-linux-gnu/gconv
      - usr/share/man
      - usr/share/doc/*/README.*
      - usr/share/doc/*/changelog.*
      - usr/share/doc/*/NEWS.*
      - usr/share/doc/*/TODO.*

AppImage:
  update-information: None
  sign-key: None
  arch: x86_64
