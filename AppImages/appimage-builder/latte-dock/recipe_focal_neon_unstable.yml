version: 1

script:
  - rm -r $(pwd)/AppDir $(pwd)/appimage-builder-cache $(pwd)/*.AppImage

AppDir:
  path: ./AppDir

  app_info:
    id: latte-dock
    name: latte-dock
    icon: latte-dock
    version: 0.9.11
    exec: usr/bin/latte-dock

  apt:
    arch: amd64
    sources:
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu focal main restricted universe multiverse'
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu focal-security main restricted universe multiverse'
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu focal-updates main restricted universe multiverse'
        key_url: 'https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C'
      - sourceline: 'deb [arch=amd64] http://archive.neon.kde.org/unstable focal main'
        key_url: 'https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xE6D4736255751E5D'
      - sourceline: 'deb [arch=amd64] https://repo.nxos.org/nitrux nitrux main'
        key_url: 'https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x08ECF4DF1B69B2DA'
    
    include:
      - latte-dock
      - nx-audio-applet
      - nx-clock-applet
      - nx-networkmanagement-applet
      - nx-notifications-applet
      - nx-systemtray-applet
      - nx-simplemenu-applet
      - qt5-style-kvantum
      - gstreamer1.0-plugins-base
      - gstreamer1.0-pulseaudio
      - luv-icon-theme

    exclude: []

  runtime:
    env:
     PATH: $APPDIR/usr/bin
     XDG_DATA_DIRS: $APPDIR/usr/share:$APPDIR/usr/share/plasma/shells/org.kde.latte.shell/:$APPDIR/usr/share/plasma/plasmoids/org.kde.latte.containment/:$APPDIR/usr/share/plasma/plasmoids/org.kde.latte.plasmoid/:$XDG_DATA_DIRS
     APPDIR_LIBRARY_PATH: $APPDIR/lib/x86_64-linux-gnu:$APPDIR/usr/lib/x86_64-linux-gnu:$APPDIR/usr/lib/x86_64-linux-gnu/pulseaudio

  files:
    exclude:
      - usr/lib/x86_64-linux-gnu/gconv
      - usr/share/man
      - usr/share/doc/*/README.*
      - usr/share/doc/*/changelog.*
      - usr/share/doc/*/NEWS.*
      - usr/share/doc/*/TODO.*

AppImage:
  update-information: None
  sign-key: None
  arch: x86_64
